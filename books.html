<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books - ReadMore</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page-banner">
  <div class="container">
    <h1>All Books</h1>
    <p class="mt-1">Browse our full collection - find your next read.</p>
  </div>
</div>

<div class="container" style="padding-top: 2.5rem; padding-bottom: 3rem;">

  <div class="filter-panel">

    <div style="flex: 1; min-width: 200px;">
      <input
        type="text"
        id="search-box"
        class="form-control"
        placeholder="🔍  Search by title, author, genre…"
      />
    </div>

    <select id="genre-select" class="form-select" style="min-width: 155px;">
      <option value="">All Genres</option>
      <option value="Classic">📜 Classic</option>
      <option value="Thriller">🔪 Thriller</option>
      <option value="Historical">🏛️ Historical</option>
      <option value="Fantasy">🧙 Fantasy</option>
      <option value="Sci-Fi">🚀 Sci-Fi</option>
      <option value="Mystery">🔍 Mystery</option>
    </select>

    <select id="sort-select" class="form-select" style="min-width: 175px;">
      <option value="">Sort: Default</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="rating">Best Rated</option>
      <option value="title">Title A-Z</option>
      <option value="year-new">Newest First</option>
      <option value="year-old">Oldest First</option>
    </select>

    <button class="btn-reset" onclick="resetAll()">✕ Reset</button>

  </div>

  <p class="results-info" id="results-info">Showing all books</p>

  <div id="loading-area" class="loading-spinner">Loading books…</div>

  <div id="page-msg"></div>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4" id="books-grid"></div>

  <div id="no-results" class="no-results-msg" style="display:none;">
    <div style="font-size:2.5rem; margin-bottom:0.75rem;">📚</div>
    <h3>No books found</h3>
    <p>Try changing your search or filters.</p>
    <button class="btn-primary-custom mt-3" onclick="resetAll()">Clear All Filters</button>
  </div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="btn-load-more" id="load-more-btn" onclick="loadMore()">
      Load More Books
    </button>
    <p id="load-more-info" style="font-size:0.8rem; color:var(--brown-pale); margin-top:0.6rem;"></p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="skript.js"></script>
<script>
  loadNavbar('books');
  loadFooter();

  var allBooks = [];   
  var filteredBooks = [];   
  var visibleCount = 8;    
  var LOAD_STEP = 4;

  async function fetchBooks() {
    var loadingEl = document.getElementById('loading-area');
    var msgEl     = document.getElementById('page-msg');

    try {
      var response = await fetch('books.json');

      if (!response.ok) {
        throw new Error('Failed to load books (HTTP ' + response.status + ')');
      }

      var data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error('Expected an array of books but got something else');
      }

      if (data.length === 0) {
        throw new Error('The books list is empty');
      }

      allBooks = data;
      loadingEl.style.display = 'none';

      var params = new URLSearchParams(window.location.search);
      var genreParam = params.get('genre');
      if (genreParam) {
        document.getElementById('genre-select').value = genreParam;
      }

      applyFilters();

    } catch (err) {
      console.log('Error fetching books:', err.message);
      loadingEl.style.display = 'none';
      showMessage('page-msg', 'Could not load the book catalogue: ' + err.message, 'error');
    }
  }

  function applyFilters() {
    var query  = document.getElementById('search-box').value.trim().toLowerCase();
    var genre  = document.getElementById('genre-select').value;
    var sort   = document.getElementById('sort-select').value;

    filteredBooks = allBooks.slice();

    if (query !== '') {
      filteredBooks = filteredBooks.filter(function(book) {
        return book.title.toLowerCase().includes(query)
            || book.author.toLowerCase().includes(query)
            || book.genre.toLowerCase().includes(query)
            || book.description.toLowerCase().includes(query);
      });
    }

    if (genre !== '') {
      filteredBooks = filteredBooks.filter(function(book) {
        return book.genre === genre;
      });
    }

    if (sort === 'price-low') {
      filteredBooks.sort(function(a, b) { return a.price - b.price; });
    } else if (sort === 'price-high') {
      filteredBooks.sort(function(a, b) { return b.price - a.price; });
    } else if (sort === 'rating') {
      filteredBooks.sort(function(a, b) { return b.rating - a.rating; });
    } else if (sort === 'title') {
      filteredBooks.sort(function(a, b) { return a.title.localeCompare(b.title); });
    } else if (sort === 'year-new') {
      filteredBooks.sort(function(a, b) { return b.year - a.year; });
    } else if (sort === 'year-old') {
      filteredBooks.sort(function(a, b) { return a.year - b.year; });
    }

    visibleCount = 8;
    renderGrid();
  }

  function renderGrid() {
    var grid = document.getElementById('books-grid');
    var noRes = document.getElementById('no-results');
    var infoEl = document.getElementById('results-info');
    var lmWrap = document.getElementById('load-more-wrap');
    var lmBtn = document.getElementById('load-more-btn');
    var lmInfo = document.getElementById('load-more-info');

    if (filteredBooks.length === 0) {
      grid.innerHTML = '';
      noRes.style.display = 'block';
      lmWrap.style.display = 'none';
      infoEl.innerHTML = 'No books match your search.';
      return;
    }

    noRes.style.display = 'none';

    var toShow = filteredBooks.slice(0, visibleCount);
    grid.innerHTML = toShow.map(renderBookCard).join('');

    infoEl.innerHTML = 'Showing <strong>' + toShow.length + '</strong> of <strong>' + filteredBooks.length + '</strong> books';


    var remaining = filteredBooks.length - toShow.length;
    if (remaining > 0) {
      lmWrap.style.display = 'block';
      lmBtn.disabled = false;
      lmBtn.textContent = 'Load More Books';
      lmInfo.textContent = remaining + ' more book' + (remaining === 1 ? '' : 's') + ' remaining';
    } else {
      lmWrap.style.display = 'none';
    }
  }

  function loadMore() {
    var btn = document.getElementById('load-more-btn');
    btn.textContent = 'Loading…';
    btn.disabled = true;

    setTimeout(function() {
      visibleCount += LOAD_STEP;
      renderGrid();
    }, 400);
  }

  function resetAll() {
    document.getElementById('search-box').value   = '';
    document.getElementById('genre-select').value = '';
    document.getElementById('sort-select').value  = '';
    visibleCount = 8;
    applyFilters();
  }

  document.getElementById('search-box').addEventListener('input', applyFilters);
  document.getElementById('genre-select').addEventListener('change', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);

  fetchBooks();
</script>

</body>
</html>
