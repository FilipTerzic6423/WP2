<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - ReadMore</title>
  <meta name="description" content="Contact ReadMore bookstore for questions about orders, book recommendations, or support. Reach to us by email, phone, or our contact form.">
  <meta name="keywords" content="contact readmore, bookstore contact, book recommendations, customer support, readmore bookstore">
  <meta name="author" content="Filip Terzic">

  <meta property="og:title" content="Contact - ReadMore">
  <meta property="og:description" content="Get in touch with ReadMore bookstore. Ask about orders, book recommendations, or general inquiries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://filipterzic6423.github.io/WP2/contact.html">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='1em' font-size='90'>📖</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-banner">
  <div class="container">
    <h1>Contact Us</h1>
    <p class="mt-1">Questions about an order, a book recommendation, or somethnig else?</p>
  </div>
</div>

<section class="contact-section">
  <div class="container">
    <div class="row g-4">

      <div class="col-lg-4">
        <div class="contact-info-card">
          <h3>ReadMore Bookstore</h3>
          <p style="color: #c4a882; font-family:'Lora',serif; font-style:italic; font-size:0.9rem; margin-bottom:1.5rem;">
            We love books and we love our readers. Don't hesitate to reach out.</p>

          <div class="contact-info-item">
            <span class="contact-icon"></span>
            <div>
              <div class="contact-label">Address</div>
              <div class="contact-value">Zdravka Čelara 16, Belgrade</div>
            </div>
          </div>

          <div class="contact-info-item">
            <span class="contact-icon"></span>
            <div>
              <div class="contact-label">Email</div>
              <div class="contact-value">ReadMore@gmail.com</div>
            </div>
          </div>

          <div class="contact-info-item">
            <span class="contact-icon"></span>
            <div>
              <div class="contact-label">Phone</div>
              <div class="contact-value">061 234 5678</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="contact-form-card">
          <h3>Send a message</h3>

          <div id="form-message"></div>

          <div id="contact-form">

            <div class="row g-3">
              <div class="col-sm-6">
                <div class="form-group">
                  <label for="inp-name">Your Name <span class="required">*</span></label>
                  <input type="text" id="inp-name" class="form-control"/>
                  <span class="field-error" id="err-name"></span>
                </div>
              </div>
              <div class="col-sm-6">
                <div class="form-group">
                  <label for="inp-surname">Your Surname <span class="required">*</span></label>
                  <input type="text" id="inp-surname" class="form-control"/>
                  <span class="field-error" id="err-surname"></span>
                </div>
            </div>
            <div class="form-group">
                  <label for="inp-email">Email Address <span class="required">*</span></label>
                  <input type="email" id="inp-email" class="form-control"/>
                  <span class="field-error" id="err-email"></span>
                </div>
              </div>
            
            <div class="form-group">
              <label for="inp-subject">Subject <span class="required">*</span></label>
              <select id="inp-subject" class="form-control">
                <option value="default">Select a subject</option>
                <option value="order">Order question</option>
                <option value="book">Book recommendation</option>
                <option value="return">Returns &amp; exchanges</option>
                <option value="other">Other</option>
              </select>
              <span class="field-error" id="err-subject"></span>
            </div>

            <div class="form-group">
              <label for="inp-message">Message <span class="required">*</span></label>
              <textarea id="inp-message" class="form-control" rows="5" ></textarea>
              <span class="field-error" id="err-message"></span>
            </div>

            <div class="form-group">
              <label for="inp-phone">Phone Number <span style="color:#c4a882; font-weight:400; text-transform:none; letter-spacing:0;">(optional)</span></label>
              <input type="tel" id="inp-phone" class="form-control"/>
              <span class="field-error" id="err-phone"></span>
            </div> 

            <div class="d-flex align-items-center gap-3 flex-wrap">
              <button id="submit-btn" class="btn-submit-form" onclick="submitForm()">
                Send Message
              </button>
              <button
                onclick="resetForm()"
                style="background:none; border:1px solid #d4b896; color:#8b6347; border-radius:5px; padding:0.6rem 1.2rem; font-size:0.875rem; cursor:pointer; transition:all 0.2s;"
                onmouseover="this.style.borderColor='#5c3d2e'"
                onmouseout="this.style.borderColor='#d4b896'">Clear</button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="skript.js"></script>
<script>
  loadNavbar('contact');
  loadFooter();

  function validateForm(name, surname,email, subject, message, phone) {

    if (name.trim() === '') {
      throw { field: 'name', message: 'Please enter your name.' };
    }

    if (name.trim().length < 2) {
      throw { field: 'name', message: 'Name must be at least 2 characters.' };
    }
    if (surname.trim() === '') {
      throw { field: 'surname', message: 'Please enter your surname.' };
    }

    if (surname.trim().length < 2) {
      throw { field: 'surname', message: 'Surname must be at least 2 characters.' };
    }


    var nameRegex = /^[A-ZČĆŽŠĐ][a-zčćžšđ]{2,}$/;
    if(!nameRegex.test(name.trim())){
      throw {field: 'name', message: 'Enter valid name.'};
    }
    if(!nameRegex.test(surname.trim())){
      throw {field:'surname', message:'Enter valid surname.'}
    }

    if (email.trim() === '') {
      throw { field: 'email', message: 'Please enter your e-mail address.' };
    }

    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.trim())) {
      throw { field: 'email', message: 'Not a valid email address format.' };
    }

    if (subject === 'default') {
      throw { field: 'subject', message: 'You must select a subject.' };
    }
    if (subject === 0){
      throw { field: 'subject', message: 'You must select a subject.' };
    }
    if (message.trim() === '') {
      throw { field: 'message', message: 'You must write a message.' };
    }

    if (message.trim().length < 10) {
      throw { field: 'message', message: 'Message must be at least 10 characters' };
    }

    if (message.trim().length > 500) {
      throw { field: 'message', message: 'Message is too long, 500 characters max.' };
    }

    if (phone.trim() !== '') {
      var phoneRegex = /^(\+381|06)[0-9\s]+$/;
      if (!phoneRegex.test(phone.trim())) {
        throw { field: 'phone', message: 'Phone number must start with +381 or 06' };
      }
    }

    return true;
  }

  function clearAllErrors() {
    var fields = ['name', 'surname','email', 'subject', 'message', 'phone'];
    fields.forEach(function(f) {
      document.getElementById('inp-' + f).classList.remove('is-invalid');
      document.getElementById('err-' + f).textContent = '';
    });
  }

  function showFieldError(field, msg) {
    var input = document.getElementById('inp-' + field);
    var errEl = document.getElementById('err-' + field);
    if (input) input.classList.add('is-invalid');
    if (errEl) errEl.textContent = msg;
    if (input) input.focus();
  }

  function submitForm() {
    clearAllErrors();
    clearMessage('form-message');

    var name = document.getElementById('inp-name').value;
    var surname = document.getElementById('inp-surname').value;
    var email = document.getElementById('inp-email').value;
    var subject = document.getElementById('inp-subject').value;
    var message = document.getElementById('inp-message').value;
    var phone = document.getElementById('inp-phone').value;

    try {
      validateForm(name, surname, email, subject, message, phone);

      var btn = document.getElementById('submit-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      setTimeout(function() {
        btn.textContent = 'Send Message';
        btn.disabled = false;

        showMessage('form-message', 'Your messagr has been sent!', 'success');
        showToast('Message sent successfully!', 'success');

        resetForm();

      }, 1200);

    } catch (err) {
      if (err.field) {
        showFieldError(err.field, err.message);
        showMessage('form-message', err.message, 'error');
      } else {
        console.log('Unexpected error:', err);
        showMessage('form-message', 'Something went wrong. Please try again.', 'error');
      }
    }
  }

  function resetForm() {
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-surname').value = '';
    document.getElementById('inp-email').value = '';
    document.getElementById('inp-subject').value = 'default';
    document.getElementById('inp-message').value = '';
    document.getElementById('inp-phone').value = '';
    clearAllErrors();
  }

  ['inp-name','inp-email','inp-subject','inp-message','inp-phone'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('is-invalid');
      var errId = 'err-' + id.replace('inp-', '');
      var errEl = document.getElementById(errId);
      if (errEl) errEl.textContent = '';
    });
  });
</script>

</body>
</html>
